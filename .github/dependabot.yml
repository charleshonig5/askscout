# Dependabot configuration.
#
# Behavior is intentionally conservative: minor and patch updates are
# grouped into a single weekly PR per package directory so the review
# queue stays short. Major-version bumps come in as separate PRs (each
# major in its own branch) so they get individual review attention.
#
# GitHub Actions are bumped monthly rather than weekly: action versions
# change less often and CI is the only thing impacted.
#
# Adjust `open-pull-requests-limit` if PRs start stacking up. Setting it
# to 0 effectively pauses an ecosystem without removing the entry.

version: 2

updates:
  # ---------------------------------------------------------------------
  # GitHub Actions workflows under .github/workflows/
  # ---------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

  # ---------------------------------------------------------------------
  # npm dependencies at the workspace root (devDeps + tooling shared
  # across all packages: vitest, eslint, prettier, typescript, etc.)
  # ---------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------
  # Web app dependencies (Next.js, NextAuth, Supabase, Resend, etc.)
  # ---------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------
  # CLI package (askscout)
  # ---------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/packages/cli"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------
  # Core library (askscout-core; deprecated but still tracked)
  # ---------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
