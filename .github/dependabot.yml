# Dependabot config — keeps dependencies patched without manual chores.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Root + every package directory. Dependabot picks up package.json
  # at each path and opens grouped PRs. We weekly-batch to avoid PR
  # spam; security updates still come through immediately.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Group routine minor/patch updates so reviewers see one PR per
      # ecosystem. Major bumps still ship as their own PRs because
      # they often need code changes.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/packages/cli"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions versions also get bumped. Less frequent — monthly
  # is enough since action releases are themselves slower.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
